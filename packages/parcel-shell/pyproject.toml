[project]
name = "parcel-shell"
version = "0.0.0"
description = "Parcel shell — FastAPI app hosting auth, RBAC, admin UI, module lifecycle, and AI authoring pipeline"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sqlalchemy[asyncio]>=2.0.36",
    "asyncpg>=0.30",
    "alembic>=1.14",
    "redis>=5.2",
    "pydantic>=2.10",
    "pydantic-settings>=2.6",
    "structlog>=24.4",
    "argon2-cffi>=23.1",
    "itsdangerous>=2.2",
    "email-validator>=2.2",
    "jinja2>=3.1",
    "python-multipart>=0.0.9",
    "anthropic>=0.40,<1.0",
    "playwright>=1.45,<2.0",
    "arq>=0.26,<1.0",
    "httpx>=0.27,<1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/parcel_shell"]
