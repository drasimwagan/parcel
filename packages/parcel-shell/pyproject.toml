[project]
name = "parcel-shell"
version = "0.0.0"
description = "Parcel shell — FastAPI app hosting auth, RBAC, admin UI, module lifecycle, and AI authoring pipeline"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    # Phase 1 will populate. Kept empty to make the scaffold installable without pulling deps yet.
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/parcel_shell"]
