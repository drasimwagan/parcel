[project]
name = "parcel-sdk"
version = "0.4.0"
description = "Parcel SDK — the stable Python API that every Parcel module imports"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    "sqlalchemy[asyncio]>=2.0.36",
    "alembic>=1.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/parcel_sdk"]
