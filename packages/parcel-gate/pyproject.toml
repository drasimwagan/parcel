[project]
name = "parcel-gate"
version = "0.1.0"
description = "Parcel static-analysis gate — ruff + bandit + AST policy"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    "ruff>=0.6,<0.9",
    "bandit>=1.7,<2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/parcel_gate"]
